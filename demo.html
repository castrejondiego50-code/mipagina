<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos Moderno</title>

    <style>
        /* 1. Estilo General */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 2. Contenedor del Slider */
        .slider-container {
            position: relative;
            width: 90%;
            max-width: 600px;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background-color: #000;
        }

        /* 3. Estilo de las Imágenes */
        .slider-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Esto evita que la foto se estire */
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out; /* Transición suave */
        }

        /* Clase para mostrar la imagen actual */
        .slider-container img.activo {
            opacity: 1;
            z-index: 1;
        }

        /* 4. Indicadores (Puntitos abajo) */
        .indicadores {
            margin-top: 15px;
            display: flex;
            gap: 8px;
        }

        .punto {
            width: 12px;
            height: 12px;
            background: #ccc;
            border-radius: 50%;
            transition: 0.3s;
        }

        .punto.activo {
            background: #1a62e7;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <h2>Mi Álbum de Viajes</h2>

    <div class="slider-container">
        <img src="imagen1.jpg" class="activo" alt="Paisaje 1">
        <img src="imagen2.jpg" alt="Paisaje 2">
        <img src="imagen3.jpg" alt="Paisaje 3">
        <img src="Software.jpg" alt="Paisaje 4">
        <img src="imagen5.jpg" alt="Software">
        <img src="imagen6.jpg" alt="Software">
        <img src="imagen7.jpg" alt="Software">
        <img src="imagen8.jpg" alt="Software">
        <img src="imagen9.jpg" alt="Software">
        <img src="imagen10.jpg" alt="Software">
    </div>

    <div class="indicadores" id="indicadores">
        <div class="punto activo"></div>
        <div class="punto"></div>
        <div class="punto"></div>
        <div class="punto"></div>
    </div>

    <script>
        let imagenes = document.querySelectorAll(".slider-container img");
        let puntos = document.querySelectorAll(".punto");
        let indice = 0;

        function cambiarImagen() {
            // Quitar clase activo a la imagen y punto actual
            imagenes[indice].classList.remove("activo");
            puntos[indice].classList.remove("activo");

            // Calcular siguiente índice
            indice = (indice + 1) % imagenes.length;

            // Añadir clase activo al nuevo elemento
            imagenes[indice].classList.add("activo");
            puntos[indice].classList.add("activo");
        }

        // Cambiar cada 3 segundos para que de tiempo a ver la foto
        setInterval(cambiarImagen, 3000);
    </script>

</body>
</html>



<h2>Álbum de Fotos</h2>



<div class="slider">

  <img src="imagen1.jpg" class="activo">

  <img src="imagen2.jpg">

  <img src="imagen3.jpg">

  <img src="Software.jpg">

  <img src="imagen5.jpg" alt="Software">
  <img src="imagen6.jpg" alt="Software">
  <img src="imagen7.jpg" alt="Software">
  <img src="imagen8.jpg" alt="Software">
  <img src="imagen9.jpg" alt="Software">
  <img src="imagen10.jpg" alt="Software">

</div>



<script>

  let imagenes = document.querySelectorAll(".slider img");

  let indice = 0;



  function cambiarImagen() {

    imagenes[indice].classList.remove("activo");

    indice = (indice + 1) % imagenes.length;

    imagenes[indice].classList.add("activo");

  }



  setInterval(cambiarImagen, 2000); // Cambia cada 2 segundos

</script>



</body>

</html>
